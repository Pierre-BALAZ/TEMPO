# Mises à jour de dépendances automatiques (une PR = une revue Claude gratuite).
version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    groups:
      minors-et-patchs:
        update-types: [minor, patch]
    open-pull-requests-limit: 5
  - package-ecosystem: npm
    directory: /server
    schedule:
      interval: weekly
    groups:
      minors-et-patchs:
        update-types: [minor, patch]
    open-pull-requests-limit: 3
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 3
