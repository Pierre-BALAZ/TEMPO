name: Claude Code Review
on:
  pull_request:
    types: [opened, synchronize]

concurrency:
  group: claude-code-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 1

      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            Fais la revue de cette pull request, en français, avec un focus sur :
            - Qualité du code et bonnes pratiques
            - Bugs potentiels
            - Implications de sécurité
            - Performance

            Note : la branche de la PR est déjà checkoutée dans le répertoire courant.

            Utilise `gh pr comment` pour le commentaire de synthèse.
            Utilise `mcp__github_inline_comment__create_inline_comment` (avec `confirmed: true`)
            pour pointer les problèmes sur des lignes précises.
            Ne poste que des commentaires GitHub — pas de texte de review en messages.

          claude_args: |
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*)"
