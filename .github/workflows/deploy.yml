name: Déploiement GitHub Pages

# Construit l'application et la publie sur GitHub Pages à chaque envoi sur la
# branche principale. Rien à installer en local : GitHub s'en charge.

on:
  push:
    branches: [main, master]
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Récupération du code
        uses: actions/checkout@v4
      - name: Installation de Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Installation des dépendances
        run: npm ci
      - name: Construction (Vite)
        run: npm run build
      - name: Préparation de l'artefact Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Déploiement sur GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
