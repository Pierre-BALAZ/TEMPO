name: Déploiement GitHub Pages

# Construit l'application et la publie sur GitHub Pages à chaque envoi sur la
# branche principale. Rien à installer en local : GitHub s'en charge.

on:
  push:
    branches: [main, master]
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Récupération du code
        uses: actions/checkout@v7
      - name: Installation de Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
      - name: Installation des dépendances
        run: npm ci
      - name: Construction (Vite)
        run: npm run build
        env:
          # URL du serveur de salons (variable de repo, réglée par un admin —
          # docs/DEPLOYMENT.md). Vide tant qu'elle n'existe pas : l'app propose
          # alors la saisie manuelle de l'adresse du serveur.
          VITE_SYNC_URL: ${{ vars.TEMPO_SYNC_URL }}
      - name: Préparation de l'artefact Pages
        uses: actions/upload-pages-artifact@v5
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Déploiement sur GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
