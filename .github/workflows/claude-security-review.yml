name: Claude Security Review
on:
  pull_request:
    types: [opened, synchronize]

concurrency:
  group: claude-security-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  security:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      security-events: write
      id-token: write
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 1

      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # GITHUB_TOKEN natif : évite l'échange de token via l'app GitHub Claude
          # (non installée sur ce compte — installation possible uniquement par le propriétaire)
          github_token: ${{ secrets.GITHUB_TOKEN }}
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            Fais une revue de sécurité complète de cette PR, en français :

            ## Analyse OWASP Top 10
            - Injection SQL
            - Cross-Site Scripting (XSS)
            - Authentification défaillante
            - Exposition de données sensibles
            - Entités externes XML (XXE)
            - Contrôle d'accès défaillant
            - Mauvaise configuration de sécurité
            - Cross-Site Request Forgery (CSRF)
            - Composants avec vulnérabilités connues
            - Journalisation et supervision insuffisantes

            ## Vérifications complémentaires
            - Secrets ou identifiants en dur
            - Pratiques cryptographiques faibles
            - Désérialisation non sûre
            - Server-Side Request Forgery (SSRF)
            - Race conditions / TOCTOU

            Classe la sévérité : CRITICAL, HIGH, MEDIUM, LOW ou NONE.
            Ne signale que les problèmes réels et exploitables — pas de bruit théorique.
            Poste tes constats détaillés avec recommandations en commentaires GitHub.

          claude_args: |
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*)"
